<!DOCTYPE html><html><head>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-app-region:drag; }
  body { height:100vh; display:flex; flex-direction:column; align-items:center;
    justify-content:center; gap:18px; font-family:'Segoe UI',system-ui,sans-serif;
    background:#060a1e; color:#fff;
    background-image:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(167,139,250,0.15),transparent); }
  .logo { font-size:10px; font-weight:800; letter-spacing:4px; text-transform:uppercase;
    color:rgba(167,139,250,0.7); }
  h1 { font-size:20px; font-weight:700; letter-spacing:-.3px; }
  p  { font-size:12px; color:rgba(148,163,184,0.55); }
  .spinner { width:32px; height:32px; border-radius:50%;
    border:3px solid rgba(167,139,250,0.12);
    border-top-color:rgba(167,139,250,0.85);
    animation:spin .75s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg) } }
</style></head><body>
  <div class="logo">TRADRS</div>
  <h1>Starting up…</h1>
  <p>Launching your trading dashboard</p>
  <div class="spinner"></div>
</body></html>
